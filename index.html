<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV Forecast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-size: 1.15rem; }
    .main-title { font-size: 3.25rem; line-height: 1.05; }   /* Balanced size */
    .date-line { font-size: 1.75rem; font-weight: 400; color: #374151; }
    h2 { font-size: 1.85rem; font-weight: 600; }
    .model-label { font-size: 1.35rem; font-weight: 500; }
    .total-value { font-size: 3rem; line-height: 1.05; font-weight: 700; }
  </style>
</head>
<body class="bg-gray-50 p-6 font-sans">
  <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl p-8">
    <div class="text-center mb-12">
      <h1 id="pageTitle" class="main-title font-bold text-emerald-950 flex items-center justify-center gap-4">
        ☀️ PV Forecast
      </h1>
      <div id="dateLine" class="date-line mt-2"></div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-10 text-lg">
      <div><label class="block font-medium text-gray-700">Latitude</label><input id="lat" value="53.2" class="w-full border rounded px-4 py-3 text-lg"></div>
      <div><label class="block font-medium text-gray-700">Longitude</label><input id="lon" value="-2.59" class="w-full border rounded px-4 py-3 text-lg"></div>
      <div><label class="block font-medium text-gray-700">Tilt (°)</label><input id="tilt" value="40" class="w-full border rounded px-4 py-3 text-lg"></div>
      <div><label class="block font-medium text-gray-700">Azimuth</label><input id="az" value="10" class="w-full border rounded px-4 py-3 text-lg"></div>
      <div><label class="block font-medium text-gray-700">kWp</label><input id="kwp" value="8" class="w-full border rounded px-4 py-3 text-lg"></div>
      <div><label class="block font-medium text-gray-700">Temp coeff (%/°C)</label><input id="coeff" value="-0.35" class="w-full border rounded px-4 py-3 text-lg"></div>
    </div>

    <div id="loading" class="text-center py-12 text-2xl text-gray-600">Loading Met Office UK 2km… (ICON-D2 after 1s delay)</div>

    <div id="results" class="hidden">
      <!-- Today -->
      <div class="mb-16">
        <h2 class="text-2xl font-semibold mb-6 text-black">Today</h2>
        <div class="grid grid-cols-2 gap-8">
          <div class="bg-emerald-50 p-8 rounded-3xl text-center border border-emerald-200">
            <p class="model-label text-emerald-700">Met Office</p>
            <p id="todayMet" class="total-value text-emerald-900 mt-2">— <span class="text-2xl font-medium">kWh</span></p>
          </div>
          <div class="bg-blue-50 p-8 rounded-3xl text-center border border-blue-200">
            <p class="model-label text-blue-700">ICON-D2</p>
            <p id="todayICON" class="total-value text-blue-900 mt-2">— <span class="text-2xl font-medium">kWh</span></p>
          </div>
        </div>
        <canvas id="todayChart" height="240" class="mt-12"></canvas>
      </div>

      <!-- Tomorrow -->
      <div>
        <h2 class="text-2xl font-semibold mb-6 text-black">Tomorrow</h2>
        <div class="grid grid-cols-2 gap-8">
          <div class="bg-emerald-50 p-8 rounded-3xl text-center border border-emerald-200">
            <p class="model-label text-emerald-700">Met Office</p>
            <p id="tomMet" class="total-value text-emerald-900 mt-2">— <span class="text-2xl font-medium">kWh</span></p>
          </div>
          <div class="bg-blue-50 p-8 rounded-3xl text-center border border-blue-200">
            <p class="model-label text-blue-700">ICON-D2</p>
            <p id="tomICON" class="total-value text-blue-900 mt-2">— <span class="text-2xl font-medium">kWh</span></p>
          </div>
        </div>
        <canvas id="tomChart" height="240" class="mt-12"></canvas>
      </div>
    </div>
  </div>

  <script>
    let todayChartInst = null, tomChartInst = null;

    function updateTitle() {
      const now = new Date();
      const options = { day: 'numeric', month: 'short' };
      const dateStr = now.toLocaleDateString('en-GB', options);
      document.getElementById('dateLine').textContent = dateStr;
    }

    async function loadForecast() {
      const lat = document.getElementById('lat').value;
      const lon = document.getElementById('lon').value;
      const tilt = document.getElementById('tilt').value;
      const az = document.getElementById('az').value;
      const kwp = parseFloat(document.getElementById('kwp').value);
      const coeff = parseFloat(document.getElementById('coeff').value) / 100;

      const baseParams = `latitude=${lat}&longitude=${lon}&hourly=global_tilted_irradiance,temperature_2m&tilt=${tilt}&azimuth=${az}&timezone=auto&forecast_days=3`;

      let gti_uk = [], gti_icon = [], temp = [], times = [];

      try {
        // UK 2km (Met Office)
        document.getElementById('loading').textContent = "Loading Met Office UK 2km…";
        let res = await fetch(`https://api.open-meteo.com/v1/forecast?${baseParams}&models=ukmo_uk_deterministic_2km`);
        let data = await res.json();
        times = data.hourly.time;
        gti_uk = data.hourly.global_tilted_irradiance || [];
        temp = data.hourly.temperature_2m || [];

        await new Promise(r => setTimeout(r, 1000));

        // ICON-D2
        document.getElementById('loading').textContent = "Loading ICON-D2…";
        res = await fetch(`https://api.open-meteo.com/v1/forecast?${baseParams}&models=icon_d2`);
        data = await res.json();
        gti_icon = data.hourly.global_tilted_irradiance || [];

        const now = new Date();
        const todayStr = now.toISOString().slice(0,10);
        const tomorrowStr = new Date(now.getTime() + 86400000).toISOString().slice(0,10);

        let todayLabels = [], todayMet = [], todayICON = [];
        let tomLabels = [], tomMet = [], tomICON = [];
        let todayYieldMet = 0, todayYieldICON = 0;
        let tomYieldMet = 0, tomYieldICON = 0;

        for (let i = 0; i < times.length; i++) {
          const hourDate = times[i].slice(0,10);
          const hourTime = new Date(times[i]);

          const valUK = gti_uk[i] != null ? gti_uk[i] : 0;
          const valICON = gti_icon[i] != null ? gti_icon[i] : 0;

          const powerMet = Math.max(0, (valUK / 1000) * kwp * (1 + coeff * ((temp[i] || 15) - 25)));
          const powerICON = Math.max(0, (valICON / 1000) * kwp * (1 + coeff * ((temp[i] || 15) - 25)));

          const hourStr = hourTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          if (hourDate === todayStr) {
            todayYieldMet += powerMet;
            todayYieldICON += powerICON;
            if (i < 40) {
              todayLabels.push(hourStr);
              todayMet.push(powerMet.toFixed(2));
              todayICON.push(powerICON.toFixed(2));
            }
          }

          if (hourDate === tomorrowStr) {
            tomYieldMet += powerMet;
            tomYieldICON += powerICON;
            tomLabels.push(hourStr);
            tomMet.push(powerMet.toFixed(2));
            tomICON.push(powerICON.toFixed(2));
          }
        }

        // Update totals
        document.getElementById('todayMet').innerHTML = todayYieldMet.toFixed(1) + ' <span class="text-2xl font-medium">kWh</span>';
        document.getElementById('todayICON').innerHTML = todayYieldICON.toFixed(1) + ' <span class="text-2xl font-medium">kWh</span>';
        document.getElementById('tomMet').innerHTML = tomYieldMet.toFixed(1) + ' <span class="text-2xl font-medium">kWh</span>';
        document.getElementById('tomICON').innerHTML = tomYieldICON.toFixed(1) + ' <span class="text-2xl font-medium">kWh</span>';

        // Today Chart
        if (todayChartInst) todayChartInst.destroy();
        todayChartInst = new Chart(document.getElementById('todayChart'), {
          type: 'line',
          data: {
            labels: todayLabels,
            datasets: [
              { label: 'Met Office', data: todayMet, borderColor: '#10b981', borderWidth: 4, tension: 0.3 },
              { label: 'ICON-D2', data: todayICON, borderColor: '#2563eb', borderWidth: 4, tension: 0.3 }
            ]
          },
          options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });

        // Tomorrow Chart
        if (tomChartInst) tomChartInst.destroy();
        tomChartInst = new Chart(document.getElementById('tomChart'), {
          type: 'line',
          data: {
            labels: tomLabels,
            datasets: [
              { label: 'Met Office', data: tomMet, borderColor: '#10b981', borderWidth: 4, tension: 0.3 },
              { label: 'ICON-D2', data: tomICON, borderColor: '#2563eb', borderWidth: 4, tension: 0.3 }
            ]
          },
          options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
      } catch (e) {
        document.getElementById('loading').innerHTML = `Error: ${e.message}<br><small>Refresh page</small>`;
      }
    }

    window.addEventListener('load', () => {
      updateTitle();
      loadForecast();
    });
  </script>
</body>
</html>
